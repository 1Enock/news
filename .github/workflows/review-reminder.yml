name: Monthly Review Reminder

on:
  schedule:
    - cron: '0 9 1 * *' # 09:00 UTC on the 1st of every month

jobs:
  create-review-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create monthly review issue
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: 'Monthly review: Update docs & examples'
          content-filepath: .github/issue-templates/monthly_review.md
          assignees: ''
          labels: 'review,monthly'
